<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tabla Periódica Interactiva</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0e1a;
  --surface: #111827;
  --surface-hover: #1e293b;
  --text: #e2e8f0;
  --text-muted: #94a3b8;
  --border: #1e293b;
  --cat-no-metal: #06b6d4;
  --cat-alkali: #f43f5e;
  --cat-alkaline: #f97316;
  --cat-transition: #eab308;
  --cat-post-transition: #84cc16;
  --cat-metalloid: #22d3ee;
  --cat-halogen: #a78bfa;
  --cat-noble: #e879f9;
  --cat-lanthanide: #fb923c;
  --cat-actinide: #f87171;
  --glow-spread: 12px;
  --modal-overlay-bg: rgba(0,0,0,0.7);
  --cat-bg-alpha: 0.15;
}

@media (prefers-color-scheme: light) {
  :root {
    --bg: #f5f7fa;
    --surface: #ffffff;
    --surface-hover: #e8ecf1;
    --text: #1a202c;
    --text-muted: #5a6577;
    --border: #d1d9e6;
    --cat-no-metal: #0891b2;
    --cat-alkali: #e11d48;
    --cat-alkaline: #ea580c;
    --cat-transition: #ca8a04;
    --cat-post-transition: #65a30d;
    --cat-metalloid: #0891b2;
    --cat-halogen: #7c3aed;
    --cat-noble: #c026d3;
    --cat-lanthanide: #ea580c;
    --cat-actinide: #dc2626;
    --modal-overlay-bg: rgba(0,0,0,0.4);
    --cat-bg-alpha: 0.12;
  }
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  min-height: 100vh;
  overflow-x: auto;
}

/* ── HEADER ── */
header {
  text-align: center;
  padding: 2rem 1rem 1rem;
  position: relative;
}
header h1 {
  font-size: clamp(1.6rem, 4vw, 2.8rem);
  font-weight: 900;
  letter-spacing: -0.02em;
  background: linear-gradient(135deg, #06b6d4, #a78bfa, #f43f5e);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
header p {
  color: var(--text-muted);
  font-size: 0.95rem;
  margin-top: 0.3rem;
  font-weight: 300;
}

/* ── LEGEND ── */
.legend {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 0.5rem 1rem;
  padding: 0.8rem 1rem;
  max-width: 1100px;
  margin: 0 auto;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 0.35rem;
  font-size: 0.72rem;
  color: var(--text-muted);
  cursor: pointer;
  padding: 0.2rem 0.5rem;
  border-radius: 6px;
  transition: all 0.2s;
  user-select: none;
}
.legend-item:hover { background: var(--surface); }
.legend-item.active {
  background: var(--surface-hover);
  color: var(--text);
  outline: 2px solid var(--text-muted);
  outline-offset: -1px;
}
.legend-dot {
  width: 10px; height: 10px;
  border-radius: 3px;
  flex-shrink: 0;
}

/* ── SEARCH ── */
.search-bar {
  display: flex;
  justify-content: center;
  padding: 0.5rem 1rem 1rem;
}
.search-bar input {
  width: 320px;
  max-width: 90vw;
  padding: 0.6rem 1rem;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  font-size: 0.9rem;
  outline: none;
  transition: border-color 0.2s;
}
.search-bar input::placeholder { color: var(--text-muted); }
.search-bar input:focus { border-color: #06b6d4; }

/* ── TABLE CONTAINER ── */
.table-wrap {
  width: 100%;
  overflow-x: auto;
  padding: 0 1rem 1rem;
  -webkit-overflow-scrolling: touch;
}
.periodic-table {
  display: grid;
  grid-template-columns: repeat(18, 1fr);
  gap: 3px;
  min-width: 920px;
  max-width: 1200px;
  margin: 0 auto;
}

/* ── ELEMENT CELL ── */
.element {
  aspect-ratio: 1;
  border-radius: 6px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  position: relative;
  transition: transform 0.18s, box-shadow 0.18s, opacity 0.25s;
  border: 1px solid transparent;
  min-width: 0;
  padding: 2px;
}
.element .z { font-size: clamp(0.5rem, 0.9vw, 0.65rem); font-weight: 400; opacity: 0.7; line-height: 1; }
.element .sym { font-size: clamp(0.9rem, 1.8vw, 1.3rem); font-weight: 700; line-height: 1.15; font-family: 'JetBrains Mono', monospace; }
.element .name { font-size: clamp(0.38rem, 0.65vw, 0.52rem); font-weight: 300; opacity: 0.8; line-height: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100%; }
.element .mass { font-size: clamp(0.35rem, 0.55vw, 0.45rem); opacity: 0.5; line-height: 1; }

.element:hover {
  transform: scale(1.35);
  z-index: 10;
  border-color: rgba(255,255,255,0.2);
}
@media (prefers-color-scheme: light) {
  .element:hover { border-color: rgba(0,0,0,0.15); }
}
.element.dimmed { opacity: 0.12; transform: scale(1); pointer-events: none; }
.element.highlighted {
  transform: scale(1.12);
  z-index: 5;
  border: 2px solid currentColor;
  box-shadow: 0 0 14px currentColor;
}
@media (prefers-color-scheme: light) {
  .element.dimmed { opacity: 0.08; }
}

/* Category coloring */
.element[data-cat="no-metal"]        { background: color-mix(in srgb, var(--cat-no-metal) 15%, transparent); color: var(--cat-no-metal); }
.element[data-cat="alkali"]          { background: color-mix(in srgb, var(--cat-alkali) 15%, transparent); color: var(--cat-alkali); }
.element[data-cat="alkaline"]        { background: color-mix(in srgb, var(--cat-alkaline) 15%, transparent); color: var(--cat-alkaline); }
.element[data-cat="transition"]      { background: color-mix(in srgb, var(--cat-transition) 15%, transparent); color: var(--cat-transition); }
.element[data-cat="post-transition"] { background: color-mix(in srgb, var(--cat-post-transition) 15%, transparent); color: var(--cat-post-transition); }
.element[data-cat="metalloid"]       { background: color-mix(in srgb, var(--cat-metalloid) 18%, transparent); color: var(--cat-metalloid); }
.element[data-cat="halogen"]         { background: color-mix(in srgb, var(--cat-halogen) 15%, transparent); color: var(--cat-halogen); }
.element[data-cat="noble"]           { background: color-mix(in srgb, var(--cat-noble) 15%, transparent); color: var(--cat-noble); }
.element[data-cat="lanthanide"]      { background: color-mix(in srgb, var(--cat-lanthanide) 15%, transparent); color: var(--cat-lanthanide); }
.element[data-cat="actinide"]        { background: color-mix(in srgb, var(--cat-actinide) 15%, transparent); color: var(--cat-actinide); }

@media (prefers-color-scheme: light) {
  .element[data-cat="no-metal"]        { background: color-mix(in srgb, var(--cat-no-metal) 12%, white); }
  .element[data-cat="alkali"]          { background: color-mix(in srgb, var(--cat-alkali) 12%, white); }
  .element[data-cat="alkaline"]        { background: color-mix(in srgb, var(--cat-alkaline) 12%, white); }
  .element[data-cat="transition"]      { background: color-mix(in srgb, var(--cat-transition) 12%, white); }
  .element[data-cat="post-transition"] { background: color-mix(in srgb, var(--cat-post-transition) 12%, white); }
  .element[data-cat="metalloid"]       { background: color-mix(in srgb, var(--cat-metalloid) 14%, white); }
  .element[data-cat="halogen"]         { background: color-mix(in srgb, var(--cat-halogen) 12%, white); }
  .element[data-cat="noble"]           { background: color-mix(in srgb, var(--cat-noble) 12%, white); }
  .element[data-cat="lanthanide"]      { background: color-mix(in srgb, var(--cat-lanthanide) 12%, white); }
  .element[data-cat="actinide"]        { background: color-mix(in srgb, var(--cat-actinide) 12%, white); }
}

.element[data-cat="no-metal"]:hover        { box-shadow: 0 0 var(--glow-spread) var(--cat-no-metal); }
.element[data-cat="alkali"]:hover          { box-shadow: 0 0 var(--glow-spread) var(--cat-alkali); }
.element[data-cat="alkaline"]:hover        { box-shadow: 0 0 var(--glow-spread) var(--cat-alkaline); }
.element[data-cat="transition"]:hover      { box-shadow: 0 0 var(--glow-spread) var(--cat-transition); }
.element[data-cat="post-transition"]:hover { box-shadow: 0 0 var(--glow-spread) var(--cat-post-transition); }
.element[data-cat="metalloid"]:hover       { box-shadow: 0 0 var(--glow-spread) var(--cat-metalloid); }
.element[data-cat="halogen"]:hover         { box-shadow: 0 0 var(--glow-spread) var(--cat-halogen); }
.element[data-cat="noble"]:hover           { box-shadow: 0 0 var(--glow-spread) var(--cat-noble); }
.element[data-cat="lanthanide"]:hover      { box-shadow: 0 0 var(--glow-spread) var(--cat-lanthanide); }
.element[data-cat="actinide"]:hover        { box-shadow: 0 0 var(--glow-spread) var(--cat-actinide); }

/* Spacer for gaps */
.spacer { visibility: hidden; }

/* Lanthanide / Actinide labels */
.series-label {
  grid-column: 1 / 4;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding-right: 6px;
  font-size: 0.6rem;
  font-weight: 500;
  color: var(--text-muted);
}

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: var(--modal-overlay-bg);
  backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s;
  padding: 1rem;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 2rem;
  max-width: 520px;
  width: 100%;
  position: relative;
  transform: translateY(20px) scale(0.95);
  transition: transform 0.3s;
  max-height: 90vh;
  overflow-y: auto;
}
.modal-overlay.open .modal { transform: translateY(0) scale(1); }
.modal-close {
  position: absolute; top: 1rem; right: 1rem;
  background: none; border: none; color: var(--text-muted);
  font-size: 1.5rem; cursor: pointer; line-height: 1;
  width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
  border-radius: 8px;
}
.modal-close:hover { background: var(--surface-hover); color: var(--text); }

.modal-header {
  display: flex;
  align-items: flex-end;
  gap: 1rem;
  margin-bottom: 1.5rem;
}
.modal-symbol {
  font-family: 'JetBrains Mono', monospace;
  font-size: 3.5rem;
  font-weight: 700;
  line-height: 1;
}
.modal-title { display: flex; flex-direction: column; gap: 0.15rem; }
.modal-title .el-name { font-size: 1.4rem; font-weight: 600; }
.modal-title .el-number { font-size: 0.85rem; color: var(--text-muted); }

.modal-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.6rem;
  margin-bottom: 1.5rem;
}
.modal-stat {
  background: var(--bg);
  border-radius: 10px;
  padding: 0.7rem 0.9rem;
}
.modal-stat .label { font-size: 0.68rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
.modal-stat .value { font-size: 1rem; font-weight: 600; margin-top: 0.15rem; }

.modal-section-title {
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  margin-bottom: 0.5rem;
  font-weight: 500;
}
.modal-desc {
  font-size: 0.9rem;
  line-height: 1.6;
  color: var(--text);
  font-weight: 300;
}
.modal-example {
  background: var(--bg);
  border-radius: 10px;
  padding: 0.8rem 1rem;
  margin-top: 0.8rem;
  border-left: 3px solid;
}
.modal-example .ex-title {
  font-size: 0.75rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 0.3rem;
}
.modal-example .ex-text {
  font-size: 0.85rem;
  line-height: 1.5;
  font-weight: 300;
  color: var(--text-muted);
}

.modal-nav {
  display: flex;
  justify-content: space-between;
  margin-top: 1.5rem;
  gap: 0.5rem;
}
.modal-nav button {
  flex: 1;
  padding: 0.55rem;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text-muted);
  font-family: 'Outfit', sans-serif;
  font-size: 0.8rem;
  cursor: pointer;
  transition: all 0.15s;
}
.modal-nav button:hover { background: var(--surface-hover); color: var(--text); }

/* ── FOOTER ── */
footer {
  text-align: center;
  padding: 1.5rem 1rem;
  color: var(--text-muted);
  font-size: 0.75rem;
  font-weight: 300;
}
footer a { color: var(--cat-no-metal); text-decoration: none; }

/* ── ANIMATIONS ── */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.element {
  animation: fadeInUp 0.4s ease both;
}

/* responsive */
@media (max-width: 600px) {
  .modal { padding: 1.5rem; }
  .modal-symbol { font-size: 2.5rem; }
  .modal-grid { grid-template-columns: 1fr; }
  .legend { gap: 0.3rem 0.6rem; }
}
</style>
</head>

<header>
  <h1>Tabla Periódica de los Elementos</h1>
  <p>Haz clic en cualquier elemento para explorar sus propiedades y usos cotidianos</p>
</header>

<div class="legend" id="legend"></div>

<div class="search-bar">
  <input type="text" id="search" placeholder="🔍 Buscar por nombre, símbolo o número…" autocomplete="off">
</div>

<div class="table-wrap">
  <div class="periodic-table" id="table"></div>
</div>

<div class="modal-overlay" id="modal-overlay">

</div>

<footer>

  [68,"Er","Erbio","167.26","lanthanide",3,6,3,"[Xe] 4f¹² 6s²","s",

  [70,"Yb","Iterbio","173.05","lanthanide",3,6,3,"[Xe] 4f¹⁴ 6s²","s",

  [89,"Ac","Actinio","227","actinide",3,7,3,"[Rn] 6d¹ 7s²","s",

  [90,"Th","Torio","232.04","actinide",3,7,3,"[Rn] 6d² 7s²","s",
    "Radiactivo pero más común que el uranio. Posible combustible nuclear del futuro.",
    "💡 Las camisetas incandescentes de lámparas de camping antiguas usaban torio para brillar."],
  [91,"Pa","Protactinio","231.04","actinide",3,7,3,"[Rn] 5f² 6d¹ 7s²","s",
    "Muy raro, tóxico y radiactivo. Uno de los elementos más escasos.",
    "🔬 Se usa exclusivamente en investigación científica. Es extremadamente difícil de manipular."],
  [92,"U","Uranio","238.03","actinide",3,7,3,"[Rn] 5f³ 6d¹ 7s²","s",
    "Combustible nuclear principal. Más abundante que el oro en la corteza terrestre.",
    "⚛️ Las centrales nucleares usan uranio-235 para generar electricidad mediante fisión nuclear."],
  [93,"Np","Neptunio","237","actinide",3,7,3,"[Rn] 5f⁴ 6d¹ 7s²","syn",
    "Primer elemento transuránico. Nombrado por el planeta Neptuno.",
    "🔬 Se produce como subproducto en reactores nucleares. Se usa en detectores de neutrones."],

    "Elemento clave en armas nucleares y fuente de energía espacial.",

  [95,"Am","Americio","243","actinide",3,7,3,"[Rn] 5f⁷ 7s²","syn",
    "Elemento radiactivo presente en muchos hogares sin saberlo.",

  [96,"Cm","Curio","247","actinide",3,7,3,"[Rn] 5f⁷ 6d¹ 7s²","syn",
    "Nombrado en honor a Marie y Pierre Curie.",
    "🚀 El rover Curiosity de Marte usa curio-244 como fuente de energía y en su analizador de rocas."],

    "Nombrado por Berkeley, California. Muy difícil de producir.",

  [99,"Es","Einstenio","252","actinide",3,7,3,"[Rn] 5f¹¹ 7s²","syn",
    "Descubierto en los restos de la primera bomba termonuclear.",

    "🔬 Es el elemento más pesado que se puede crear por bombardeo de neutrones."],

    "🔬 Solo se han producido unos pocos átomos a la vez. Homenaje al padre de esta tabla."],
  [102,"No","Nobelio","259","actinide",3,7,3,"[Rn] 5f¹⁴ 7s²","syn",
    "Nombrado por Alfred Nobel, creador de los Premios Nobel.",
    "🔬 Tiene una vida media de 58 minutos, relativamente larga para un actínido pesado."],
  [103,"Lr","Lawrencio","266","actinide",3,7,3,"[Rn] 5f¹⁴ 7s² 7p¹","syn",
    "El último actínido. Nombrado por Ernest Lawrence, inventor del ciclotrón.",
    "🔬 Su configuración electrónica fue confirmada solo en 2015 mediante experimentos en Japón."]
];

// ── GRID LAYOUT ──
// Main table positions: [Z] → {row, col}
const gridPos = {};
// Standard positions for periods 1-7
elements.forEach(el => {
  const z = el[0], period = el[6], col = el[7];
  const cat = el[4];
  if (cat === "lanthanide") {
    // Lanthanides go in row 9, cols 4-17
    gridPos[z] = { row: 9, col: 4 + (z - 57) };
  } else if (cat === "actinide") {
    // Actinides go in row 10, cols 4-17
    gridPos[z] = { row: 10, col: 4 + (z - 89) };
  } else {
    gridPos[z] = { row: period, col: col };
  }
});

// Build element lookup
const elMap = {};
elements.forEach(el => { elMap[el[0]] = el; });

const searchInput = document.getElementById('search');

// ── BUILD LEGEND ──
const legendEl = document.getElementById('legend');
Object.entries(CAT_LABELS).forEach(([key, label]) => {
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.dataset.cat = key;
  item.innerHTML = `<span class="legend-dot" style="background:${CAT_COLORS[key]}"></span>${label}`;
  item.addEventListener('click', () => filterByCat(key));
  legendEl.appendChild(item);
});

let activeCat = null;
function filterByCat(cat) {
  searchInput.value = '';
  if (activeCat === cat) {
    activeCat = null;
    document.querySelectorAll('.legend-item').forEach(l => l.classList.remove('active'));
    document.querySelectorAll('.element').forEach(e => e.classList.remove('dimmed', 'highlighted'));
  } else {
    activeCat = cat;
    document.querySelectorAll('.legend-item').forEach(l => {
      l.classList.toggle('active', l.dataset.cat === cat);
    });
    document.querySelectorAll('.element').forEach(e => {
      const match = e.dataset.cat === cat;
      e.classList.toggle('dimmed', !match);
      e.classList.toggle('highlighted', match);
    });
  }
}

// ── BUILD TABLE ──
const table = document.getElementById('table');

// We need a grid with 18 cols and 10 rows (7 periods + gap + 2 series)
// Build cells row by row
for (let row = 1; row <= 10; row++) {
  for (let col = 1; col <= 18; col++) {
    // Find element at this position
    const z = Object.keys(gridPos).find(k => gridPos[k].row === row && gridPos[k].col === col);

    if (row === 6 && col === 3) {
      // Lanthanide placeholder
      const ph = document.createElement('div');
      ph.className = 'element';
      ph.style.background = 'rgba(251,146,60,0.1)';
      ph.style.color = '#fb923c';
      ph.style.fontSize = '0.55rem';
      ph.style.cursor = 'default';
      ph.innerHTML = '<span style="font-size:0.6rem;font-weight:600">57-71</span><span class="name">Lantánidos</span>';
      ph.style.animationDelay = `${(row * 18 + col) * 8}ms`;
      table.appendChild(ph);
      continue;
    }
    if (row === 7 && col === 3) {
      // Actinide placeholder
      const ph = document.createElement('div');
      ph.className = 'element';
      ph.style.background = 'rgba(248,113,113,0.1)';
      ph.style.color = '#f87171';
      ph.style.fontSize = '0.55rem';
      ph.style.cursor = 'default';
      ph.innerHTML = '<span style="font-size:0.6rem;font-weight:600">89-103</span><span class="name">Actínidos</span>';
      ph.style.animationDelay = `${(row * 18 + col) * 8}ms`;
      table.appendChild(ph);
      continue;
    }

    if (row === 8) {
      // Gap row
      const spacer = document.createElement('div');
      spacer.className = 'spacer';
      spacer.style.height = '8px';
      table.appendChild(spacer);
      continue;
    }

    if (z) {
      const el = elMap[z];
      const cell = document.createElement('div');
      cell.className = 'element';
      cell.dataset.cat = el[4];
      cell.dataset.z = el[0];
      cell.style.animationDelay = `${(row * 18 + col) * 8}ms`;
      cell.innerHTML = `
        <span class="z">${el[0]}</span>
        <span class="sym">${el[1]}</span>
        <span class="name">${el[2]}</span>
        <span class="mass">${el[3]}</span>
      `;
      cell.addEventListener('click', () => openModal(el[0]));
      table.appendChild(cell);
    } else {
      const spacer = document.createElement('div');
      spacer.className = 'spacer';
      table.appendChild(spacer);
    }
  }
}

// ── SEARCH ──
function clearAllFilters() {
  document.querySelectorAll('.element').forEach(e => {
    e.classList.remove('dimmed', 'highlighted');
  });
  activeCat = null;
  document.querySelectorAll('.legend-item').forEach(l => l.classList.remove('active'));
}

searchInput.addEventListener('input', () => {
  const q = searchInput.value.toLowerCase().trim();
  if (!q) {
    clearAllFilters();
    return;
  }
  activeCat = null;
  document.querySelectorAll('.legend-item').forEach(l => l.classList.remove('active'));
  document.querySelectorAll('.element[data-z]').forEach(cell => {
    const el = elMap[cell.dataset.z];
    const match = el[2].toLowerCase().includes(q) ||
                  el[1].toLowerCase().includes(q) ||
                  String(el[0]).includes(q);
    cell.classList.toggle('dimmed', !match);
    cell.classList.toggle('highlighted', match);
  });
  document.querySelectorAll('.element:not([data-z])').forEach(cell => {
    cell.classList.add('dimmed');
    cell.classList.remove('highlighted');
  });
});

// ── MODAL ──
const overlay = document.getElementById('modal-overlay');
const modalEl = document.getElementById('modal');

function openModal(z) {
  const el = elMap[z];
  if (!el) return;

  const catColor = CAT_COLORS[el[4]];
  const catLabel = CAT_LABELS[el[4]];
  const stateLabel = STATES_LABEL[el[9]] || el[9];

  // Find prev/next
  const allZ = elements.map(e => e[0]).sort((a, b) => a - b);
  const idx = allZ.indexOf(Number(z));
  const prevZ = idx > 0 ? allZ[idx - 1] : null;
  const nextZ = idx < allZ.length - 1 ? allZ[idx + 1] : null;

  modalEl.innerHTML = `
    <button class="modal-close" onclick="closeModal()" aria-label="Cerrar">&times;</button>
    <div class="modal-header">
      <div class="modal-symbol" style="color:${catColor}">${el[1]}</div>
      <div class="modal-title">
        <div class="el-name">${el[2]}</div>
        <div class="el-number">Elemento ${el[0]} · ${catLabel}</div>
      </div>
    </div>
    <div class="modal-grid">
      <div class="modal-stat"><div class="label">Masa atómica</div><div class="value">${el[3]} u</div></div>
      <div class="modal-stat"><div class="label">Estado (25°C)</div><div class="value">${stateLabel}</div></div>
      <div class="modal-stat"><div class="label">Config. electrónica</div><div class="value" style="font-family:'JetBrains Mono',monospace;font-size:0.8rem">${el[8]}</div></div>
      <div class="modal-stat"><div class="label">Categoría</div><div class="value" style="color:${catColor}">${catLabel}</div></div>
    </div>
    <div class="modal-section-title">Descripción</div>
    <div class="modal-desc">${el[10]}</div>
    <div class="modal-example" style="border-color:${catColor}">
      <div class="ex-title" style="color:${catColor}">¿Dónde lo encuentras?</div>
      <div class="ex-text">${el[11]}</div>
    </div>
    <div class="modal-nav">
      ${prevZ ? `<button onclick="openModal(${prevZ})">← ${elMap[prevZ][1]} ${elMap[prevZ][2]}</button>` : '<button disabled>—</button>'}
      ${nextZ ? `<button onclick="openModal(${nextZ})">${elMap[nextZ][2]} ${elMap[nextZ][1]} →</button>` : '<button disabled>—</button>'}
    </div>
  `;
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  overlay.classList.remove('open');
  document.body.style.overflow = '';
}

overlay.addEventListener('click', (e) => {
  if (e.target === overlay) closeModal();
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});
</script>
</body>
